<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Running Portal{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  </head>
  <body>
    <nav class="topbar">
      <a href="/" class="nav-logo">Running Portal</a>
      <div class="nav-links">
        <a href="/">Дашборд</a>
        <button id="sync-btn" type="button" onclick="triggerSync()">Синхронизировать</button>
        <span id="sync-status" class="status-pill"></span>
      </div>
    </nav>
    <main class="shell">
      {% block content %}{% endblock %}
    </main>
    <script src="/static/app.js"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
